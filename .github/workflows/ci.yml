name: CI with Docker

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t network-monitor .

    - name: Run tests inside Docker
      run: docker run network-monitor pytest
