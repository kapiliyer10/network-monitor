name: CI with Docker

on:
  push:
    branches: [ "main" ]

env:
  GCP_REGION: ${{ vars.GCP_REGION }}
  AR_REPO: ${{ vars.AR_REPO }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  CLOUD_RUN_JOB: ${{ vars.CLOUD_RUN_JOB }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t network-monitor .

    - name: Run tests inside Docker
      run: docker run network-monitor pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

    - name: Build and push image
      run: |
        IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
        docker build -t "$IMAGE" .
        docker push "$IMAGE"
        echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

    - name: Deploy Cloud Run job
      run: |
        gcloud run jobs deploy "${{ env.CLOUD_RUN_JOB }}" \
          --image "$IMAGE" \
          --region "${{ env.GCP_REGION }}" \
          --tasks=1 \
          --max-retries=0 \
          --task-timeout=10m \
          --quiet
